services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapsend-backend
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=/app/config.yaml
      - DATABASE_URL=sqlite+aiosqlite:////app/data/snapsend.db
      - STORAGE_PATH=/app/data/files
      - TEMP_PATH=/app/data/tmp
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:8081:8080"   # 仅宿主机可访问，避免直接暴露公网
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${BASE_URL:-http://localhost:8080}
    container_name: snapsend-frontend
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - NEXT_PUBLIC_API_URL=${BASE_URL:-http://localhost:8080}
    ports:
      - "127.0.0.1:3002:3000"   # 仅宿主机可访问
    depends_on:
      backend:
        condition: service_healthy

  # nginx 容器已移除 —— 使用宿主机已有的 Nginx 统一管理所有站点
  # 宿主机 Nginx 通过 127.0.0.1:3001 访问前端，127.0.0.1:8081 访问后端
