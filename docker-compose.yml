services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapsend-backend
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=/app/config.yaml
      - DATABASE_URL=sqlite+aiosqlite:////app/data/snapsend.db
      - STORAGE_PATH=/app/data/files
      - TEMP_PATH=/app/data/tmp
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${BASE_URL:-http://localhost:8080}
    container_name: snapsend-frontend
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - NEXT_PUBLIC_API_URL=${BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: snapsend-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"  # 启用 HTTPS 时取消注释
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro  # SSL 证书目录
    depends_on:
      - backend
      - frontend
